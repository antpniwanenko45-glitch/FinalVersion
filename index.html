<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourGPT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">YourGPT</div>

    <div class="menu">
      <div class="menu-item">+ New chat</div>
      <div class="menu-item">Search chats</div>
      <div class="menu-item">Projects</div>
      <div class="menu-item">More</div>
    </div>

    <div class="chats" id="chats"></div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="chat" id="chat"></div>
  </div>

</div>

<!-- FLOATING INPUT -->
<div class="input-floating">
  <div class="input-inner">
    <span class="plus">+</span>
    <input type="text" placeholder="Ask anything..." />
    <span class="mic">🎤</span>
    <button onclick="nextStep()">↑</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
